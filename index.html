<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>業務管理アプリ</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell auth-shell">
    <main class="auth-layout">
      <section class="brand-panel card">
        <p class="eyebrow">Work Management</p>
        <h1>業務管理アプリ</h1>
        <p class="muted">日報・業務実績・月末確認に絞った運用向けUIです。</p>
        <ul class="bullet-list">
          <li>学生は出勤確認を補助表示</li>
          <li>社会人は時給ベースで管理</li>
          <li>日報入力を中心にした導線</li>
        </ul>
      </section>

      <section class="card auth-card">
        <div class="tab-group">
          <button type="button" class="tab-btn is-active" data-auth-tab="staff">スタッフ</button>
          <button type="button" class="tab-btn" data-auth-tab="admin">管理者</button>
        </div>

        <form id="staffLoginForm" class="auth-form">
          <h2>スタッフログイン</h2>
          <label>
            <span>ログインID</span>
            <input name="id" autocomplete="username" required>
          </label>
          <label>
            <span>パスワード</span>
            <input name="pw" type="password" autocomplete="current-password" required>
          </label>
          <button class="btn primary" type="submit">スタッフとしてログイン</button>
        </form>

        <form id="adminLoginForm" class="auth-form hidden">
          <h2>管理者ログイン</h2>
          <label>
            <span>ログインID</span>
            <input name="id" autocomplete="username" required>
          </label>
          <label>
            <span>パスワード</span>
            <input name="pw" type="password" autocomplete="current-password" required>
          </label>
          <button class="btn primary" type="submit">管理者としてログイン</button>
        </form>

        <div id="loginMessage" class="inline-message hidden"></div>
        <div class="auth-links">
          <a class="link-btn" href="./staff.html">スタッフ画面へ</a>
          <a class="link-btn" href="./admin.html">管理画面へ</a>
        </div>
      </section>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./shared.js"></script>
  <script src="./index.js"></script>
</body>
</html>
